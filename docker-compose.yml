services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eventregistration
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventregistration"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
  
  api:
    build: ./Backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Database=eventregistration;Username=postgres;Password=postgres
      ASPNETCORE_ENVIRONMENT: Development

  web:
    build: ./Frontend
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data: